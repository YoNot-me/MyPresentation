<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админ — Бренды</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
          href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500&display=swap"
          rel="stylesheet"
  />
  <link rel="stylesheet" href="/admin/panel/style.css" />
</head>
<body>
<div class="brandmark">by Yo</div>
<button class="logout" id="logoutBtn" type="button">Выйти</button>

<div class="page-ghost">Админ</div>

<div class="brands-head">
  <h1 class="brands-title">Бренды</h1>
  <button class="btn-outline" id="addBrandBtn" type="button">
    + Добавить бренд
  </button>
</div>

<main class="brands-grid" id="brandsGrid"></main>
<p class="state-msg" id="stateMsg">Загрузка…</p>

<!-- модалка создания бренда -->
<div class="modal-overlay" id="addBrandOverlay" hidden>
  <div class="modal">
    <h2 class="modal-title">Новый бренд</h2>
    <div class="modal-fields">
      <input
              class="field"
              id="newBrandName"
              placeholder="Название бренда"
              autocomplete="off"
      />
      <input
              class="field"
              id="newBrandPassword"
              type="password"
              placeholder="Пароль"
              autocomplete="new-password"
      />
    </div>
    <p class="modal-error" id="addBrandError"></p>
    <div class="modal-actions">
      <button class="btn-ghost" id="addBrandCancel" type="button">
        Отмена
      </button>
      <button class="btn-pill" id="addBrandSubmit" type="button">
        Создать
      </button>
    </div>
  </div>
</div>

<!-- модалка добавления работы (открывается с "+" у бренда) -->
<div class="modal-overlay" id="addWorkOverlay" hidden>
  <div class="modal">
    <h2 class="modal-title">Новая работа</h2>
    <p class="modal-sub" id="addWorkBrandLabel"></p>
    <div class="modal-fields">
      <input
              class="field"
              id="newWorkName"
              placeholder="Название работы"
              autocomplete="off"
      />
      <input
              class="field"
              id="newWorkUrl"
              placeholder="Ссылка на диск"
              autocomplete="off"
      />
      <textarea
              class="field field-textarea"
              id="newWorkDesc"
              placeholder="Описание"
      ></textarea>
      <label class="file-field" id="newWorkPreviewLabel">
        <span id="newWorkPreviewText">Загрузить превью</span>
        <input
                type="file"
                id="newWorkPreview"
                accept="image/*"
                hidden
        />
      </label>
      <label class="file-field" id="newWorkFilesLabel">
        <span id="newWorkFilesText">Загрузить файлы работы (до 50)</span>
        <input
                type="file"
                id="newWorkFiles"
                accept="image/*"
                multiple
                hidden
        />
      </label>
    </div>
    <p class="modal-error" id="addWorkError"></p>
    <div class="modal-actions">
      <button class="btn-ghost" id="addWorkCancel" type="button">
        Отмена
      </button>
      <button class="btn-pill" id="addWorkSubmit" type="button">
        Добавить
      </button>
    </div>
  </div>
</div>

<!-- баннер-предупреждение для подтверждения удаления бренда -->
<div class="modal-overlay" id="confirmDeleteOverlay" hidden>
  <div class="modal">
    <div class="warn-banner">
      <span class="warn-icon" aria-hidden="true">!</span>
      <span>Это действие необратимо. Все работы и файлы бренда будут
        удалены безвозвратно.</span>
    </div>
    <h2 class="modal-title">Удалить бренд?</h2>
    <p class="modal-sub" id="confirmDeleteLabel"></p>
    <p class="modal-error" id="confirmDeleteError"></p>
    <div class="modal-actions">
      <button class="btn-ghost" id="confirmDeleteCancel" type="button">
        Отмена
      </button>
      <button class="btn-danger" id="confirmDeleteSubmit" type="button">
        Удалить бренд
      </button>
    </div>
  </div>
</div>

<script src="/admin/panel/app.js" data-page="brands"></script>
</body>
</html>
