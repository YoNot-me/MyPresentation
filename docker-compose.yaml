services:
  postgres-database:
    image: postgres:18.3-bookworm
    container_name: presentation-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always

  redis:
    image: redis:8.8.0-alpine
    container_name: presentation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: presentation-postgres-port-forwarder
    depends_on:
      postgres-database:
        condition: service_healthy
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:postgres-database:5432
    ports:
      - "127.0.0.1:5433:5432"