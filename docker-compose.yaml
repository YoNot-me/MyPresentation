services:
  postgres-database:
    image: postgres:18.3-bookworm
    container_name: presentation-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:8.8.0-alpine
    container_name: presentation-redis
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    depends_on:
      postgres-database:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@presentation-postgres:5432/${POSTGRES_DB}?sslmode=disable"
      - "up"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 40s
      timeout: 3s
      retries: 3
    container_name: presentation-app
    depends_on:
      postgres-database:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    environment:
      - PRES_ADDR=:8080
      - PRES_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-database:5432/${POSTGRES_DB}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PRES_JWT_SECRET=${PRES_JWT_SECRET}
      - PRES_JWT_ISSUER=${PRES_JWT_ISSUER}
      - PRES_ADMIN_LOGIN=${PRES_ADMIN_LOGIN}
      - PRES_ADMIN_PASSWORD=${PRES_ADMIN_PASSWORD}
    expose:
      - "8080"
    volumes:
      - ./out/works:/app/works
      - ./out/applogs:/app/out
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: presentation-caddy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: